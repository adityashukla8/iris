<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Input — Text</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">input-text</div>

    <div class="preview-section">
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-size:.75rem;font-weight:600;color:#334155">Query</label>
        <input type="text" placeholder="Ask the MCP server..." style="width:100%;padding:8px 12px;border:1px solid #E2E8F0;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.875rem;color:#0F172A;background:#fff;outline:none">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-size:.75rem;font-weight:600;color:#334155">Focused</label>
        <input type="text" value="list-projects" style="width:100%;padding:8px 12px;border:1px solid #475569;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.875rem;color:#0F172A;background:#fff;outline:none;box-shadow:0 0 0 3px rgba(15,23,42,.06)">
      </div>
      <div style="display:flex;gap:8px">
        <input type="text" placeholder="Search traces..." style="flex:1;padding:8px 12px;border:1px solid #E2E8F0;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.875rem;color:#0F172A;background:#fff;outline:none">
        <button style="padding:8px 16px;background:#0F172A;color:#fff;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer">Send</button>
      </div>
    </div>
  </div>
</body>
</html>
