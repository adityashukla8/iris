<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Button — Danger</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">btn-danger</div>

    <div class="preview-section">
      <div class="preview-row">
        <button style="display:inline-flex;align-items:center;gap:6px;padding:4px 11px;background:#fff;color:#E05555;border:1px solid #FFD4D4;border-radius:5px;font-family:'Poppins',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer">
          Reject
        </button>
        <button style="display:inline-flex;align-items:center;gap:6px;padding:4px 11px;background:#1A9652;color:#fff;border:none;border-radius:5px;font-family:'Poppins',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer">
          Approve
        </button>
      </div>
      <div class="preview-annotation">Healing pipeline: approve = green fill, reject = white + red border.</div>
    </div>
  </div>
</body>
</html>
