<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRIS DS — Elevation — Shadows</title>
  <link rel="stylesheet" href="_base.css">
  <style>
    body { max-width: 640px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">elevation-shadows</div>

    <div class="preview-section">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)">
          <div style="font-size:.75rem;font-weight:600;color:var(--ink-primary);margin-bottom:2px">shadow-xs</div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">tooltip, tag</div>
        </div>
        <div style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04)">
          <div style="font-size:.75rem;font-weight:600;color:var(--ink-primary);margin-bottom:2px">shadow-sm</div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">stat card, panel</div>
        </div>
        <div style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:16px;box-shadow:0 4px 12px rgba(15,23,42,.07),0 2px 4px rgba(15,23,42,.04)">
          <div style="font-size:.75rem;font-weight:600;color:var(--ink-primary);margin-bottom:2px">shadow</div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">dropdown, popover</div>
        </div>
        <div style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.08),0 3px 8px rgba(15,23,42,.05)">
          <div style="font-size:.75rem;font-weight:600;color:var(--ink-primary);margin-bottom:2px">shadow-md</div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">modal, feature card hover</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
