<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Tab Navigation</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">tab-nav</div>

    <div class="preview-section">
      <div style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden">
        <div style="display:flex;align-items:stretch;padding:0 16px;height:40px;border-bottom:1px solid #E2E8F0;gap:0">
          <button style="padding:0 16px;font-family:'Poppins',sans-serif;font-size:.8125rem;font-weight:600;color:#1D4ED8;background:none;border:none;border-bottom:2px solid #1D4ED8;cursor:pointer;height:40px;white-space:nowrap">Overview</button>
          <button style="padding:0 16px;font-family:'Poppins',sans-serif;font-size:.8125rem;font-weight:500;color:#94A3B8;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;height:40px;white-space:nowrap">Traces</button>
          <button style="padding:0 16px;font-family:'Poppins',sans-serif;font-size:.8125rem;font-weight:500;color:#94A3B8;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;height:40px;white-space:nowrap">Healing</button>
          <button style="padding:0 16px;font-family:'Poppins',sans-serif;font-size:.8125rem;font-weight:500;color:#94A3B8;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;height:40px;white-space:nowrap">Pipeline</button>
        </div>
        <div style="padding:14px 16px;font-size:.8125rem;color:#64748B">Tab content area</div>
      </div>
      <div class="preview-annotation">Active: #1D4ED8 text + 2px bottom border. Only place blue appears. No background fill.</div>
    </div>
  </div>
</body>
</html>
