<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Chip / Tag</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">chip-tag</div>

    <div class="preview-section">
      <div style="font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin-bottom:4px">Patient context chips</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        <span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:.6875rem;font-weight:500;background:#F1F5F9;color:#334155;border:1px solid #E2E8F0">PT-00142</span>
        <span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:.6875rem;font-weight:500;background:#F1F5F9;color:#334155;border:1px solid #E2E8F0">58yr · 74 kg</span>
        <span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:.6875rem;font-weight:500;background:#F1F5F9;color:#334155;border:1px solid #E2E8F0">metformin 1000mg</span>
        <span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:.6875rem;font-weight:500;background:#F1F5F9;color:#334155;border:1px solid #E2E8F0">warfarin 5mg</span>
        <span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:.6875rem;font-weight:500;font-style:italic;background:#F1F5F9;color:#334155;border:1px solid #E2E8F0">CKD Stage 4</span>
        <span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:.6875rem;font-weight:500;background:#F1F5F9;color:#334155;border:1px solid #E2E8F0">penicillin allergy</span>
      </div>
      <div class="preview-divider"></div>
      <div style="font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin-bottom:4px">Flagged claim chips</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        <span style="display:inline-flex;padding:2px 7px;border-radius:4px;font-size:.6875rem;color:#0F172A;background:transparent;border:1px solid #E05555;word-break:break-word">vancomycin 8000mg</span>
        <span style="display:inline-flex;padding:2px 7px;border-radius:4px;font-size:.6875rem;color:#0F172A;background:transparent;border:1px solid #E05555;word-break:break-word">safe for this patient</span>
      </div>
    </div>
  </div>
</body>
</html>
