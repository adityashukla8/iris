<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Badge — Status</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">badge-status</div>

    <div class="preview-section">
      <div class="preview-row">
        <span style="display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:.6875rem;font-weight:500;background:#EDFBF3;color:#1A9652;border:1px solid #D6F5E3">
          <span style="width:5px;height:5px;border-radius:50%;background:#1A9652;display:inline-block"></span> Live
        </span>
        <span style="display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:.6875rem;font-weight:500;background:#FFFBEB;color:#C07818;border:1px solid #FEE9A0">
          <span style="width:5px;height:5px;border-radius:50%;background:#C07818;display:inline-block"></span> Pending
        </span>
        <span style="display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:.6875rem;font-weight:500;background:#F1F5F9;color:#475569;border:1px solid #E2E8F0">
          <span style="width:5px;height:5px;border-radius:50%;background:#94A3B8;display:inline-block"></span> Idle
        </span>
        <span style="display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:.6875rem;font-weight:500;background:#FFF1F1;color:#C43434;border:1px solid #FFD4D4">
          <span style="width:5px;height:5px;border-radius:50%;background:#E05555;display:inline-block"></span> Error
        </span>
      </div>
    </div>
  </div>
</body>
</html>
