<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>IRIS DS — Logo — Mark</title>
  <link rel="stylesheet" href="_base.css">
  <style>
    body { max-width: 640px; margin: 0 auto; }

</head>
<body>
  <div class="preview-card">

    <div class="preview-section">

              <circle cx="20" cy="20" r="11" stroke="#fff" stroke-width="1.5" stroke-dasharray="17 52.83" stroke-dashoffset="-4" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="7.5" stroke="#fff" stroke-width="1.5" stroke-dasharray="12 47.12" stroke-dashoffset="-2.5" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="2.5" fill="#fff"/>
            </svg>
          </div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">56px — topbar</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <div style="background:#0F172A;width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center">

        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <div style="background:#0F172A;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center">
            <svg width="18" height="18" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="11" stroke="#fff" stroke-width="1.5" stroke-dasharray="17 52.83" stroke-dashoffset="-4" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="7.5" stroke="#fff" stroke-width="1.5" stroke-dasharray="12 47.12" stroke-dashoffset="-2.5" stroke-linecap="round"/>

            <circle cx="20" cy="20" r="11" stroke="#fff" stroke-width="1.5" stroke-dasharray="17 52.83" stroke-dashoffset="-4" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="7.5" stroke="#fff" stroke-width="1.5" stroke-dasharray="12 47.12" stroke-dashoffset="-2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="2.5" fill="#fff"/>

          <div style="font-size:.625rem;color:#94A3B8">on dark</div>
