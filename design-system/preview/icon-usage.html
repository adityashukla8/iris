<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Icon Usage</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">icon-usage</div>

    <div class="preview-section">
      <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface-raised);border-radius:8px;border:1px solid var(--border-subtle)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E05555" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span style="font-size:.8125rem;font-weight:500;color:var(--ink-primary)">Critical — drug dosage exceeded</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface-raised);border-radius:8px;border:1px solid var(--border-subtle)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C07818" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span style="font-size:.8125rem;font-weight:500;color:var(--ink-primary)">Warning — attribution gap detected</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface-raised);border-radius:8px;border:1px solid var(--border-subtle)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A9652" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span style="font-size:.8125rem;font-weight:500;color:var(--ink-primary)">Pass — all evaluations clear</span>
      </div>
    </div>
  </div>
</body>
</html>
