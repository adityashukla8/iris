<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Stat Card</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">stat-card</div>

    <div class="preview-section">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div style="position:relative;background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 16px 14px 20px;box-shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);overflow:hidden">
          <div style="position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 2px 2px 0;background:#E05555"></div>
          <div style="font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin-bottom:5px">Hallucinations</div>
          <div style="font-size:1.625rem;font-weight:700;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums;color:#0F172A">14</div>
          <div style="font-size:.6875rem;color:#94A3B8">caught this shift</div>
        </div>
        <div style="position:relative;background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 16px 14px 20px;box-shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);overflow:hidden">
          <div style="position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 2px 2px 0;background:#1A9652"></div>
          <div style="font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin-bottom:5px">Pass Rate</div>
          <div style="font-size:1.625rem;font-weight:700;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums;color:#0F172A">84%</div>
          <div style="font-size:.6875rem;color:#94A3B8">info / total traces</div>
        </div>
        <div style="position:relative;background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 16px 14px 20px;box-shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);overflow:hidden">
          <div style="position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 2px 2px 0;background:#94A3B8"></div>
          <div style="font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin-bottom:5px">Total Traces</div>
          <div style="font-size:1.625rem;font-weight:700;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums;color:#0F172A">128</div>
          <div style="font-size:.6875rem;color:#94A3B8">this session</div>
        </div>
        <div style="position:relative;background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 16px 14px 20px;box-shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);overflow:hidden">
          <div style="position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 2px 2px 0;background:#C07818"></div>
          <div style="font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin-bottom:5px">Self-Heals</div>
          <div style="font-size:1.625rem;font-weight:700;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums;color:#0F172A">3</div>
          <div style="font-size:.6875rem;color:#94A3B8">prompt versions deployed</div>
        </div>
      </div>
      <div class="preview-annotation">Rail via ::before pseudo-element. Never border-left.</div>
    </div>
  </div>
</body>
</html>
