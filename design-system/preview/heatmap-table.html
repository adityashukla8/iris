<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Heatmap Table</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">heatmap-table</div>

    <div class="preview-section">
      <table style="width:100%;border-collapse:collapse;font-size:.8125rem">
        <thead>
          <tr>
            <th style="text-align:left;padding:7px 12px;font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;border-bottom:1px solid #E2E8F0;background:#F8FAFC">Evaluator</th>
            <th style="text-align:right;padding:7px 12px;font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;border-bottom:1px solid #E2E8F0;background:#F8FAFC">Runs</th>
            <th style="text-align:right;padding:7px 12px;font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;border-bottom:1px solid #E2E8F0;background:#F8FAFC">Fail</th>
            <th style="text-align:right;padding:7px 12px;font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;border-bottom:1px solid #E2E8F0;background:#F8FAFC">Avg</th>
          </tr>
        </thead>
        <tbody>
          <tr style="background:#FFF3F3">
            <td style="padding:7px 12px;border-bottom:1px solid #F1F5F9;font-weight:500;color:#334155;font-size:.75rem">dosage_boundary</td>
            <td style="padding:7px 12px;border-bottom:1px solid #F1F5F9;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#64748B">9</td>
            <td style="padding:7px 12px;border-bottom:1px solid #F1F5F9;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#C43434;font-weight:600">6</td>
            <td style="padding:7px 12px;border-bottom:1px solid #F1F5F9;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#64748B">3.2</td>
          </tr>
          <tr>
            <td style="padding:7px 12px;border-bottom:1px solid #F1F5F9;font-weight:500;color:#334155;font-size:.75rem">factual_hallucination</td>
            <td style="padding:7px 12px;border-bottom:1px solid #F1F5F9;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#64748B">12</td>
            <td style="padding:7px 12px;border-bottom:1px solid #F1F5F9;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#64748B">1</td>
            <td style="padding:7px 12px;border-bottom:1px solid #F1F5F9;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#64748B">8.4</td>
          </tr>
          <tr>
            <td style="padding:7px 12px;font-weight:500;color:#334155;font-size:.75rem">drug_interaction</td>
            <td style="padding:7px 12px;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#64748B">7</td>
            <td style="padding:7px 12px;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#64748B">0</td>
            <td style="padding:7px 12px;text-align:right;font-variant-numeric:tabular-nums;font-size:.75rem;color:#64748B">9.1</td>
          </tr>
        </tbody>
      </table>
      <div class="preview-annotation">Row background hsl tint based on failure rate. No color when 0 failures.</div>
    </div>
  </div>
</body>
</html>
