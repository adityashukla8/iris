<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRIS DS — Typography Scale</title>
  <link rel="stylesheet" href="_base.css">
  <style>
    body { max-width: 640px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">typography-scale</div>

    <div class="preview-section">
      <div style="font-size:clamp(2rem,5vw,3rem);font-weight:800;line-height:1.15;letter-spacing:-.03em;color:#0F172A">Display · 800</div>
      <div style="font-size:clamp(1.625rem,3.5vw,2.375rem);font-weight:700;line-height:1.2;letter-spacing:-.02em">Heading 1 · 700</div>
      <div style="font-size:1.5rem;font-weight:700;line-height:1.25;letter-spacing:-.015em">Heading 2 · 700</div>
      <div style="font-size:1.125rem;font-weight:600;line-height:1.35;letter-spacing:-.01em">Heading 3 · 600</div>
      <div class="preview-divider"></div>
      <div style="font-size:1.0625rem;line-height:1.75;color:var(--ink-secondary)">Body Large · 400 · 1.0625rem</div>
      <div style="font-size:.9375rem;line-height:1.65;color:var(--ink-secondary)">Body · 400 · 0.9375rem</div>
      <div style="font-size:.875rem;line-height:1.6;color:var(--ink-secondary)">Body Small · 400 · 0.875rem</div>
      <div style="font-size:.8125rem;color:var(--ink-secondary)">Caption · 400 · 0.8125rem</div>
      <div style="font-size:.75rem;font-weight:600;color:var(--ink-secondary)">Label · 600 · 0.75rem</div>
      <div style="font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-tertiary)">MICRO · 600 · 0.625rem · UPPERCASE</div>
    </div>
  </div>
</body>
</html>
