<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Topbar</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">topbar</div>

    <div class="preview-section">
      <div style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;box-shadow:0 1px 2px rgba(15,23,42,.04)">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:28px;height:28px;background:#0F172A;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="18" height="18" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="11" stroke="#fff" stroke-width="1.5" stroke-dasharray="17 52.83" stroke-dashoffset="-4" stroke-linecap="round"/><circle cx="20" cy="20" r="7.5" stroke="#fff" stroke-width="1.5" stroke-dasharray="12 47.12" stroke-dashoffset="-2.5" stroke-linecap="round"/><circle cx="20" cy="20" r="2.5" fill="#fff"/></svg>
            </div>
            <span style="font-size:.9375rem;font-weight:700;color:#0F172A">IRIS</span>
          </div>
          <div style="width:1px;height:18px;background:#E2E8F0"></div>
          <span style="font-size:.8125rem;font-weight:500;color:#64748B">Shift Commander</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="display:flex;align-items:center;gap:5px;font-size:.75rem;font-weight:500;color:#1A9652">
            <div style="width:6px;height:6px;border-radius:50%;background:#1A9652"></div>
            Live
          </div>
          <button style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:.8125rem;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;background:#fff;color:#475569;border:1px solid #E2E8F0">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
