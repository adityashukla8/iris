<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Badge — Severity</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">badge-severity</div>

    <div class="preview-section">
      <div class="preview-row">
        <span style="display:inline-flex;align-items:center;padding:1px 7px;background:#FFF1F1;color:#C43434;border:1px solid #FFD4D4;border-radius:4px;font-size:.625rem;font-weight:600">CRITICAL</span>
        <span style="display:inline-flex;align-items:center;padding:1px 7px;background:#FFFBEB;color:#C07818;border:1px solid #FEE9A0;border-radius:4px;font-size:.625rem;font-weight:600">WARNING</span>
        <span style="display:inline-flex;align-items:center;padding:1px 7px;background:#EDFBF3;color:#1A9652;border:1px solid #D6F5E3;border-radius:4px;font-size:.625rem;font-weight:600">PASS</span>
        <span style="display:inline-flex;align-items:center;padding:1px 7px;background:#F1F5F9;color:#475569;border:1px solid #E2E8F0;border-radius:4px;font-size:.625rem;font-weight:600">SKIPPED</span>
      </div>
      <div class="preview-row">
        <span style="display:inline-flex;align-items:center;padding:3px 10px;background:#FFF1F1;color:#C43434;border:1px solid #FFD4D4;border-radius:5px;font-size:.75rem;font-weight:600">CRITICAL</span>
        <span style="display:inline-flex;align-items:center;padding:3px 10px;background:#FFFBEB;color:#C07818;border:1px solid #FEE9A0;border-radius:5px;font-size:.75rem;font-weight:600">WARNING</span>
        <span style="display:inline-flex;align-items:center;padding:3px 10px;background:#EDFBF3;color:#1A9652;border:1px solid #D6F5E3;border-radius:5px;font-size:.75rem;font-weight:600">PASS</span>
      </div>
      <div class="preview-annotation">Never use severity colors as large fills. Chips and dots only.</div>
    </div>
  </div>
</body>
</html>
