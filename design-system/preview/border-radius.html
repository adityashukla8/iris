<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRIS DS — Border Radius</title>
  <link rel="stylesheet" href="_base.css">
  <style>
    body { max-width: 640px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">border-radius</div>

    <div class="preview-section">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:40px;height:40px;background:var(--slate-200);border-radius:4px"></div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">r-xs 4px</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:40px;height:40px;background:var(--slate-200);border-radius:6px"></div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">r-sm 6px</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:40px;height:40px;background:var(--slate-200);border-radius:8px"></div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">r 8px</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:40px;height:40px;background:var(--slate-200);border-radius:10px"></div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">r-md 10px</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:40px;height:40px;background:var(--slate-200);border-radius:14px"></div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">r-lg 14px</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:40px;height:40px;background:var(--slate-200);border-radius:9999px"></div>
          <div style="font-size:.625rem;color:var(--ink-tertiary)">r-full</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
