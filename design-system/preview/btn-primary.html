<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRIS DS — Button — Primary</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">btn-primary</div>

    <div class="preview-section">
      <div class="preview-row">
        <button style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#0F172A;color:#fff;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer">
          Launch Scan
        </button>
        <button style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:#0F172A;color:#fff;border:none;border-radius:6px;font-family:'Poppins',sans-serif;font-size:.8125rem;font-weight:600;cursor:pointer">
          Small
        </button>
        <button style="display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:#0F172A;color:#fff;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:600;cursor:pointer">
          Large
        </button>
      </div>
      <div class="preview-row">
        <button style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#1E293B;color:#fff;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer" disabled>
          Disabled
        </button>
      </div>
      <div class="preview-annotation">Primary = --gray-900 fill. No blue. No hover transform.</div>
    </div>
  </div>
</body>
</html>
