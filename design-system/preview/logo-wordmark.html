<!DOCTYPE html>
<html lang="en">
<head>

  <style>

        </div>
        <div>
          <div style="font-size:.9375rem;font-weight:700;color:#0F172A;line-height:1.1">IRIS</div>

      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:16px 20px;background:#0F172A;border-radius:8px">

        </div>

          <div style="font-size:.5625rem;font-weight:500;color:#64748B;letter-spacing:.06em;text-transform:uppercase">Clinical AI Safety</div>
        </div>
      </div>
    </div>
