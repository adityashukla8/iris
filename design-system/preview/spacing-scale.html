<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRIS DS — Spacing Scale</title>
  <link rel="stylesheet" href="_base.css">
  <style>
    body { max-width: 640px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="preview-card">
    <div class="preview-label">spacing-scale</div>

    <div class="preview-section">
      <div style="font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-tertiary);margin-bottom:8px">4px base grid</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:4px;height:4px;background:#CBD5E1;border-radius:2px;flex-shrink:0"></div>
          <div style="height:16px;background:#E2E8F0;border-radius:2px;flex:0 0 4px"></div>
          <div style="font-size:.75rem;color:var(--ink-tertiary)">space-1 — 4px</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:4px;height:4px;background:#CBD5E1;border-radius:2px;flex-shrink:0"></div>
          <div style="height:16px;background:#E2E8F0;border-radius:2px;flex:0 0 8px"></div>
          <div style="font-size:.75rem;color:var(--ink-tertiary)">space-2 — 8px</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:4px;height:4px;background:#CBD5E1;border-radius:2px;flex-shrink:0"></div>
          <div style="height:16px;background:#E2E8F0;border-radius:2px;flex:0 0 12px"></div>
          <div style="font-size:.75rem;color:var(--ink-tertiary)">space-3 — 12px</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:4px;height:4px;background:#CBD5E1;border-radius:2px;flex-shrink:0"></div>
          <div style="height:16px;background:#E2E8F0;border-radius:2px;flex:0 0 16px"></div>
          <div style="font-size:.75rem;color:var(--ink-tertiary)">space-4 — 16px</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:4px;height:4px;background:#CBD5E1;border-radius:2px;flex-shrink:0"></div>
          <div style="height:16px;background:#E2E8F0;border-radius:2px;flex:0 0 24px"></div>
          <div style="font-size:.75rem;color:var(--ink-tertiary)">space-6 — 24px</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:4px;height:4px;background:#CBD5E1;border-radius:2px;flex-shrink:0"></div>
          <div style="height:16px;background:#E2E8F0;border-radius:2px;flex:0 0 32px"></div>
          <div style="font-size:.75rem;color:var(--ink-tertiary)">space-8 — 32px</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:4px;height:4px;background:#CBD5E1;border-radius:2px;flex-shrink:0"></div>
          <div style="height:16px;background:#E2E8F0;border-radius:2px;flex:0 0 48px"></div>
          <div style="font-size:.75rem;color:var(--ink-tertiary)">space-12 — 48px</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
